name: update-prices

on:
  schedule:
    - cron: '17 6 * * 1' # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-prices.mjs
        env:
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }} # optional; GCS prices stay pinned without it
      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || { git commit -m "chore: refresh prices $(date -u +%F)"; git push; }
